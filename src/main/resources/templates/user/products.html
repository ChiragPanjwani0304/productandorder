<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Products')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">

    <div class="page-header">
        <span class="page-title">Products</span>
    </div>

    <div class="alert alert-success" th:if="${param.added}">Item added to cart.</div>

    <div th:if="${products.empty}" class="empty-state">
        <p>No products available right now.</p>
    </div>

    <div class="product-grid" th:if="${!products.empty}">
        <div class="product-card" th:each="p : ${products}">
            <div class="product-card-name" th:text="${p.name}"></div>
            <div class="product-card-desc"
                 th:text="${p.description != null and !p.description.isEmpty()} ? ${p.description} : 'No description.'">
            </div>
            <div class="product-card-price" th:text="'&#8377;' + ${p.price}"></div>
            <div class="product-card-stock"
                 th:classappend="${p.quantity <= 5} ? 'low' : ''"
                 th:text="${p.quantity > 0} ? ${p.quantity} + ' in stock' : 'Out of stock'"></div>

            <form th:action="@{/cart/add}" method="post" th:if="${p.quantity > 0}">
                <input type="hidden" name="productId" th:value="${p.id}"/>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="number" name="quantity" value="1" min="1" th:max="${p.quantity}"/>
                <button type="submit" class="btn btn-primary btn-sm">Add to Cart</button>
            </form>
            <span th:if="${p.quantity == 0}"
                  style="font-size:12px;color:#888;">Unavailable</span>
        </div>
    </div>

</div>

</body>
</html>
