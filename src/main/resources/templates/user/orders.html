<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('My Orders')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">

    <div class="page-header">
        <span class="page-title">My Orders</span>
    </div>

    <div class="alert alert-success"
         th:if="${param.placed != null}"
         th:text="'Order #' + ${param.placed} + ' placed successfully.'"></div>

    <div th:if="${orders.empty}" class="empty-state">
        <p>You haven't placed any orders yet.</p>
        <a th:href="@{/products}" class="btn btn-primary">Start Shopping</a>
    </div>

    <div th:if="${!orders.empty}">
        <div class="order-card" th:each="order : ${orders}">

            <!-- Order header -->
            <div class="order-card-header">
                <div>
                    <span class="order-id" th:text="'Order #' + ${order.orderId}"></span>
                    <div class="order-meta"
                         th:text="${#temporals.format(order.placedAt, 'dd MMM yyyy, hh:mm a')}"></div>
                </div>
                <span class="order-total" th:text="'&#8377;' + ${order.totalAmount}"></span>
                <span class="badge badge-placed" th:text="${order.status}"></span>
            </div>

            <!-- Order items -->
            <table class="order-items-table">
                <tbody>
                <tr th:each="item : ${order.items}">
                    <td class="item-name" th:text="${item.productName}"></td>
                    <td class="text-muted"
                        th:text="${item.quantity} + ' &times; &#8377;' + ${item.priceAtOrder}"></td>
                    <td class="text-right" th:text="'&#8377;' + ${item.subtotal}"></td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
