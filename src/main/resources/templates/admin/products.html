<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Products')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">

    <div class="page-header">
        <span class="page-title">Products</span>
    </div>

    <div class="alert alert-success" th:if="${param.added}">Product added.</div>
    <div class="alert alert-success" th:if="${param.updated}">Product updated.</div>

    <div class="admin-layout">

        <!-- Add product form -->
        <div class="admin-sidebar">
            <div class="form-card">
                <h3>Add Product</h3>
                <form th:action="@{/admin/products}" th:object="${productRequest}" method="post">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" th:field="*{name}" placeholder="e.g. Wireless Mouse"/>
                        <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea th:field="*{description}" rows="2" placeholder="Optional"></textarea>
                        <div class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                    </div>
                    <div class="flex gap-12">
                        <div class="form-group" style="flex:1;">
                            <label>Price (&#8377;)</label>
                            <input type="number" step="0.01" min="0.01" th:field="*{price}" placeholder="0.00"/>
                            <div class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                        </div>
                        <div class="form-group" style="flex:1;">
                            <label>Qty</label>
                            <input type="number" min="0" th:field="*{quantity}" placeholder="0"/>
                            <div class="field-error" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Product</button>
                </form>
            </div>
        </div>

        <!-- Product table -->
        <div class="admin-main">
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Qty</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${products.empty}">
                        <td colspan="6" style="text-align:center;color:#888;padding:28px;">
                            No products yet. Add one on the left.
                        </td>
                    </tr>
                    <tr th:each="p : ${products}">
                        <td class="text-muted" th:text="${p.id}"></td>
                        <td>
                            <div class="td-name" th:text="${p.name}"></div>
                            <div class="td-sub"
                                 th:if="${p.description != null and !p.description.isEmpty()}"
                                 th:text="${#strings.abbreviate(p.description, 50)}"></div>
                        </td>
                        <td th:text="'&#8377;' + ${p.price}"></td>
                        <td th:text="${p.quantity}"></td>
                        <td>
                                <span class="badge"
                                      th:classappend="${p.enabled} ? 'badge-active' : 'badge-inactive'"
                                      th:text="${p.enabled} ? 'Active' : 'Disabled'"></span>
                        </td>
                        <td>
                            <div class="td-actions">
                                <a th:href="@{/admin/products/{id}/edit(id=${p.id})}"
                                   class="btn btn-secondary btn-sm">Edit</a>
                                <form th:action="@{/admin/products/{id}/toggle(id=${p.id})}"
                                      method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit"
                                            class="btn btn-sm"
                                            th:classappend="${p.enabled} ? 'btn-danger' : 'btn-secondary'"
                                            th:text="${p.enabled} ? 'Disable' : 'Enable'"></button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

</body>
</html>
