<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Edit Product')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <a th:href="@{/admin/products}" class="back-link">&#8592; Back to Products</a>

    <div class="page-header">
        <span class="page-title" th:text="'Edit: ' + ${product.name}"></span>
    </div>

    <div class="form-card" style="max-width:460px;">
        <form th:action="@{/admin/products/{id}/edit(id=${product.id})}"
              th:object="${productRequest}" method="post">
            <div class="form-group">
                <label>Name</label>
                <input type="text" th:field="*{name}"/>
                <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" rows="3"></textarea>
                <div class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
            </div>
            <div class="flex gap-12">
                <div class="form-group" style="flex:1;">
                    <label>Price (&#8377;)</label>
                    <input type="number" step="0.01" min="0.01" th:field="*{price}"/>
                    <div class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                </div>
                <div class="form-group" style="flex:1;">
                    <label>Quantity</label>
                    <input type="number" min="0" th:field="*{quantity}"/>
                    <div class="field-error" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
                </div>
            </div>
            <div class="flex gap-8 mt-8">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a th:href="@{/admin/products}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
