<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Sign In')}"></head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Sign in</h2>

        <div class="alert alert-error"   th:if="${errorMsg}"        th:text="${errorMsg}"></div>
        <div class="alert alert-success" th:if="${logoutMsg}"       th:text="${logoutMsg}"></div>
        <div class="alert alert-info"    th:if="${param.registered}">Account created. Please sign in.</div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" type="text" name="username" autofocus autocomplete="username"/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" autocomplete="current-password"/>
            </div>
            <button type="submit" class="btn btn-primary btn-block mt-8">Sign In</button>
        </form>

        <p class="auth-footer">
            No account? <a th:href="@{/register}">Register</a>
        </p>
    </div>
</div>

</body>
</html>
