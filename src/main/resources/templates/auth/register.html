<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Register')}"></head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Create account</h2>

        <div class="alert alert-error" th:if="${errorMsg}" th:text="${errorMsg}"></div>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" type="text" th:field="*{username}" autofocus autocomplete="username"/>
                <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" type="email" th:field="*{email}" autocomplete="email"/>
                <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" th:field="*{password}" autocomplete="new-password"/>
                <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>
            <button type="submit" class="btn btn-primary btn-block mt-8">Register</button>
        </form>

        <p class="auth-footer">
            Already have an account? <a th:href="@{/login}">Sign in</a>
        </p>
    </div>
</div>

</body>
</html>
